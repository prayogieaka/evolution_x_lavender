name: Build Evolution X for Lavender

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Setup Environment
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison \
          build-essential zip curl zlib1g-dev \
          libc6-dev-i386 libncurses5-dev \
          x11proto-core-dev libx11-dev \
          lib32z1-dev libgl1-mesa-dev \
          libxml2-utils xsltproc unzip \
          fontconfig python3 python-is-python3 \
          bc libncurses-dev

      - name: Setup Repo Tool
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure Git
        run: |
          git config --global user.email "prayogieaka@gmail.com"
          git config --global user.name "prayogieaka"

      - name: Sync Evolution X Source
        run: |
          mkdir ~/evox && cd ~/evox
          repo init -u https://github.com/Evolution-X/manifest \
          -b udc --depth=1
          repo sync -c -j$(nproc) --force-sync \
          --no-clone-bundle --no-tags

      - name: Clone Device Trees
        run: |
          cd ~/evox
          git clone https://github.com/prayogieaka/device_xiaomi_lavender \
          device/xiaomi/lavender --depth=1
          git clone https://github.com/prayogieaka/kernel_xiaomi_lavender \
          kernel/xiaomi/lavender --depth=1
          git clone https://github.com/prayogieaka/vendor_xiaomi_lavender \
          vendor/xiaomi/lavender --depth=1

      - name: Build Evolution X
        run: |
          cd ~/evox
          source build/envsetup.sh
          lunch evox_lavender-userdebug
          make bacon -j$(nproc)

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: EvolutionX-Lavender
          path: ~/evox/out/target/product/lavender/*.zip
